<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
canvas {
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  background: #000;
}
#game-wrapper {
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
  overflow: hidden;
}
#touch-controls {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 180px;
  z-index: 100;
  pointer-events: none;
}
.touch-btn {
  position: absolute;
  pointer-events: auto;
  border-radius: 50%;
  background: rgba(255,255,255,0.18);
  border: 2px solid rgba(255,255,255,0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  color: rgba(255,255,255,0.7);
  transition: background 0.08s;
}
.touch-btn:active, .touch-btn.active {
  background: rgba(255,255,255,0.38);
}
#btn-left { width:64px; height:64px; bottom:60px; left:16px; }
#btn-right { width:64px; height:64px; bottom:60px; left:96px; }
#btn-jump { width:72px; height:72px; bottom:56px; right:16px; }
#btn-run { width:56px; height:56px; bottom:56px; right:104px; }
#btn-up { width:56px; height:56px; bottom:130px; left:52px; }

footer {
  position: fixed;
  bottom: 4px; right: 8px;
  z-index: 9999;
  font-size: 9px;
  opacity: 0.4;
}
footer a { color: #aaa; text-decoration: none; }
</style>

<body>
<div id="game-wrapper">
  <canvas id="gameCanvas"></canvas>
</div>

<div id="touch-controls">
  <div class="touch-btn" id="btn-left">&#9664;</div>
  <div class="touch-btn" id="btn-right">&#9654;</div>
  <div class="touch-btn" id="btn-up">&#9650;</div>
  <div class="touch-btn" id="btn-jump">A</div>
  <div class="touch-btn" id="btn-run">B</div>
</div>
